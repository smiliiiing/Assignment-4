<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen">
    <div class="flex flex-col gap-[30px] px-5 md:px-[60px] lg:px-[245px] py-10 md:py-[60px] w-full">
        
        <div class="flex flex-col gap-5 w-full">
            <h1 class="font-bold text-2xl md:text-[32px] leading-8 text-[#002c5c]">Job Application Tracker</h1>
            
            <div class="flex flex-col md:flex-row gap-4 w-full">
                <div class="bg-white flex-1 rounded-lg border border-gray-200 p-5">
                    <div class="flex flex-col gap-2">
                        <p class="font-medium text-sm text-[#323b49]">Total</p>
                        <p class="font-bold text-2xl text-[#002c5c]" id="total-count">0</p>
                    </div>
                </div>
                
                <div class="bg-white flex-1 rounded-lg border border-gray-200 p-5">
                    <div class="flex flex-col gap-2">
                        <p class="font-medium text-sm text-[#323b49]">Interview</p>
                        <p class="font-bold text-2xl text-[#10b981]" id="interview-count">0</p>
                    </div>
                </div>
                
                <div class="bg-white flex-1 rounded-lg border border-gray-200 p-5">
                    <div class="flex flex-col gap-2">
                        <p class="font-medium text-sm text-[#323b49]">Rejected</p>
                        <p class="font-bold text-2xl text-[#ef4444]" id="rejected-count">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full h-[1px] bg-[#E6E7E9]"></div>

        <div class="flex flex-col gap-6 w-full">
            <div class="flex flex-col md:flex-row gap-4 items-start md:items-center w-full">
                <h2 class="flex-1 font-semibold text-lg md:text-xl text-[#002c5c]">Available Jobs</h2>
                <p class="font-medium text-sm md:text-base text-[#64748b]" id="jobs-count">0 jobs</p>
            </div>

            <div class="flex gap-2 flex-wrap">
                <button class="tab-button px-3 py-2 rounded min-w-[80px] text-xs font-semibold bg-blue-500 text-white" data-tab="all">
                    All
                </button>
                <button class="tab-button px-3 py-2 rounded min-w-[80px] text-xs font-semibold bg-white text-gray-500 border" data-tab="interview">
                    Interview
                </button>
                <button class="tab-button px-3 py-2 rounded min-w-[80px] text-xs font-semibold bg-white text-gray-500 border" data-tab="rejected">
                    Rejected
                </button>
            </div>

            <div id="jobs-container" class="flex flex-col gap-4 w-full">
            </div>
        </div>

    </div>
</body>
</html>
